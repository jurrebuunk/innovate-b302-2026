<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Giant Pinboard</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="toolbar">
    <h1>Giant Pinboard</h1>
    <div class="toolbar-actions">
      <button id="modeToggle" type="button" class="icon-toggle" aria-label="Toggle single-image mode" title="Toggle single-image mode">🖼️</button>
      <form id="uploadForm">
        <input type="file" id="imageInput" name="image" accept="image/*" required />
        <button type="submit">Pin</button>
      </form>
    </div>
  </div>

  <main id="boardContainer">
    <div id="board"></div>
    <div id="singleView" aria-live="polite" hidden>
      <img id="singleImage" alt="Latest image at selected timeline position" />
      <p id="singleEmpty">No image available at this timeline position.</p>
    </div>
  </main>

  <section id="timeline" aria-label="Pin timeline">
    <div class="timeline-header">
      <span>Timeline</span>
      <span id="timelineLabel">Latest</span>
    </div>
    <div class="timeline-controls" aria-label="Timeline controls">
      <button id="timelineToStart" type="button" class="timeline-btn" aria-label="Jump to start" title="Jump to start">⏮</button>
      <button id="timelineStepBack" type="button" class="timeline-btn" aria-label="Step backward" title="Step backward">◀</button>
      <div class="timeline-editor-lane">
        <div class="timeline-ruler" id="timelineRuler" aria-hidden="true"></div>
        <div id="timelineBlips" aria-hidden="true"></div>
        <div class="timeline-playhead" id="timelinePlayhead" aria-hidden="true">
          <span class="timeline-playhead-tip"></span>
        </div>
        <input id="timelineSlider" type="range" min="0" max="0" value="0" step="1" aria-label="Timeline selector" />
      </div>
      <button id="timelineStepForward" type="button" class="timeline-btn" aria-label="Step forward" title="Step forward">▶</button>
      <button id="timelineToEnd" type="button" class="timeline-btn" aria-label="Jump to latest" title="Jump to latest">⏭</button>
    </div>
  </section>

  <script src="/history.js"></script>
  <script src="/app.js"></script>
</body>
</html>
