<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Webcam Capture</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body class="capture-page" data-embedded="0">
  <pre id="captureDebug" class="capture-debug" hidden></pre>
  <main class="capture-stage" aria-label="Webcam preview">
    <video id="captureVideo" autoplay playsinline muted></video>
    <div class="capture-overlay" aria-hidden="true"></div>
    <section id="capturePolaroid" class="capture-polaroid" hidden aria-live="polite">
      <div id="capturePolaroidGlow" class="capture-polaroid__glow" hidden aria-hidden="true"></div>
      <article id="capturePolaroidCard" class="capture-polaroid__card">
        <div class="capture-polaroid__photo">
          <video id="captureLoadingVideo" class="capture-polaroid__video" src="/assets/video/ai-loading.mp4" playsinline muted loop></video>
          <img id="captureResultImage" class="capture-polaroid__video" alt="Generated result" hidden />
        </div>
        <p id="capturePolaroidCaption" class="capture-polaroid__caption">Developing your image...</p>
      </article>
    </section>
  </main>
  <aside id="captureInspectedSidebar" class="capture-inspected" hidden data-collapsed="0">
    <button id="captureInspectedToggle" type="button" class="capture-inspected__toggle" aria-expanded="true" aria-controls="captureInspectedPanel">Hide details</button>
    <section id="captureInspectedPanel" class="capture-inspected__panel" aria-live="polite">
      <h2 class="capture-inspected__title">Inspected image</h2>
      <p id="captureInspectedEmpty" class="capture-inspected__empty">Waiting for inspected image details...</p>
      <ul id="captureInspectedList" class="capture-inspected__list" hidden></ul>
    </section>
  </aside>
  <img id="captureLogo" class="capture-logo" src="/assets/images/logo.png" alt="B302 logo" hidden />
  <button id="captureBackButton" type="button" class="capture-page-back" hidden>Nieuwe foto</button>

  <footer class="capture-footer">
    <div id="captureStatus" class="capture-status">Starting camera…</div>
    <button id="shutterButton" type="button" class="capture-shutter" aria-label="Take photo">●</button>
  </footer>

  <script src="/capture.js?v=20260331"></script>
</body>
</html>
